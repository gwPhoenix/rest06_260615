<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코스 · CODEWAVE</title>
<link rel="stylesheet" href="assets/site.css">
<script>(function(){try{var t=localStorage.getItem('cw-theme'),m=localStorage.getItem('cw-mode');if(t)document.documentElement.dataset.theme=t;if(m==='dark')document.documentElement.dataset.mode='dark';}catch(e){}})();</script>
<meta name="description" content="코딩 부트캠프부터 국가 자격증, 실무 컴퓨터 활용까지. CODEWAVE의 120+ 실무 코스를 만나보세요.">
<meta property="og:site_name" content="CODEWAVE">
<meta property="og:type" content="website">
<meta property="og:url" content="https://codewave.kr/courses.html">
<meta property="og:title" content="코스 · CODEWAVE">
<meta property="og:description" content="코딩 부트캠프부터 국가 자격증, 실무 컴퓨터 활용까지. 당신의 다음 레벨을 위한 120+ 실무 코스.">
<meta property="og:image" content="https://codewave.kr/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="코스 · CODEWAVE">
<meta name="twitter:description" content="코딩·자격증·컴퓨터 활용 — 120+ 실무 코스.">
<meta name="twitter:image" content="https://codewave.kr/assets/og-image.png">
<style>
.page-hero{ padding:calc(var(--nav-h) + 70px) 0 50px; background:var(--paper-2); position:relative; overflow:hidden; }
.page-hero .blob{ width:480px; height:480px; background:var(--blue); top:-200px; right:-100px; opacity:.16; }
.page-hero h1{ font-size:clamp(40px,6vw,84px); }
.toolbar{ position:sticky; top:var(--nav-h); z-index:90; background:var(--glass); backdrop-filter:blur(14px); border-bottom:1px solid var(--line); padding:18px 0; }
.toolbar .wrap{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:space-between; }
.filters{ display:flex; gap:8px; flex-wrap:wrap; }
.fbtn{ border:1.5px solid var(--line); background:var(--paper); padding:10px 18px; border-radius:100px; font-weight:600; font-size:14.5px; color:var(--txt-2); transition:.2s; white-space:nowrap; }
.fbtn:hover{ border-color:var(--line-strong); }
.fbtn.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
.search{ display:flex; align-items:center; gap:8px; border:1.5px solid var(--line); border-radius:100px; padding:9px 16px; background:var(--paper); }
.search input{ border:none; outline:none; font-family:inherit; font-size:14.5px; width:170px; background:none; color:var(--txt); }
.sortsel{ border:1.5px solid var(--line); border-radius:100px; padding:9px 16px; font-family:inherit; font-weight:600; font-size:14px; background:var(--paper); color:var(--txt-2); }
.count-line{ color:var(--txt-3); font-size:15px; margin-bottom:26px; }
.empty{ text-align:center; padding:80px 0; color:var(--txt-3); }
</style>
</head>
<body data-page="courses">

<header class="page-hero">
  <div class="blob"></div>
  <div class="wrap">
    <span class="eyebrow" data-reveal>All Courses</span>
    <h1 class="display" data-reveal data-d="1" style="margin-top:16px">무엇이든<br>배울 준비 완료</h1>
    <p class="lead" data-reveal data-d="2" style="margin-top:20px;max-width:520px">코딩 부트캠프부터 국가 자격증, 실무 컴퓨터 활용까지. 당신의 다음 레벨을 위한 코스를 찾아보세요.</p>
  </div>
</header>

<div class="toolbar">
  <div class="wrap">
    <div class="filters" id="filters">
      <button class="fbtn on" data-f="전체">전체</button>
      <button class="fbtn" data-f="코딩">코딩</button>
      <button class="fbtn" data-f="자격증">자격증</button>
      <button class="fbtn" data-f="컴퓨터활용">컴퓨터활용</button>
    </div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--txt-3)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="q" type="text" placeholder="코스 검색">
      </div>
      <select class="sortsel" id="sort">
        <option value="pop">인기순</option>
        <option value="rating">평점순</option>
        <option value="priceA">가격 낮은순</option>
        <option value="priceD">가격 높은순</option>
      </select>
    </div>
  </div>
</div>

<section class="section" style="padding-top:48px">
  <div class="wrap">
    <div class="count-line" id="countline"></div>
    <div class="grid g-3" id="grid"></div>
    <div class="empty" id="empty" style="display:none">조건에 맞는 코스가 없어요. 필터를 바꿔보세요.</div>
  </div>
</section>

<script src="assets/data.js"></script>
<script src="assets/chrome.js"></script>
<script src="assets/site.js"></script>
<script src="assets/theme.js"></script>
<script>
let state = { f:'전체', q:'', sort:'pop' };
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const countline = document.getElementById('countline');

function apply(){
  let list = COURSES.filter(c=>{
    const okf = state.f==='전체' || c.cat===state.f;
    const okq = !state.q || (c.title+c.sub+c.cat).toLowerCase().includes(state.q.toLowerCase());
    return okf && okq;
  });
  if(state.sort==='rating') list.sort((a,b)=>b.rating-a.rating);
  if(state.sort==='priceA') list.sort((a,b)=>a.price-b.price);
  if(state.sort==='priceD') list.sort((a,b)=>b.price-a.price);
  countline.textContent = `${list.length}개 코스`;
  grid.innerHTML = list.map(courseCardHTML).join('');
  empty.style.display = list.length? 'none':'block';
  if(window.CW && CW.scan) CW.scan();
}
document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.fbtn'); if(!b)return;
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); state.f=b.dataset.f; apply();
});
document.getElementById('q').addEventListener('input',e=>{ state.q=e.target.value; apply(); });
document.getElementById('sort').addEventListener('change',e=>{ state.sort=e.target.value; apply(); });
apply();
</script>
</body>
</html>
