<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코스 상세 · CODEWAVE</title>
<link rel="stylesheet" href="assets/site.css">
<script>(function(){try{var t=localStorage.getItem('cw-theme'),m=localStorage.getItem('cw-mode');if(t)document.documentElement.dataset.theme=t;if(m==='dark')document.documentElement.dataset.mode='dark';}catch(e){}})();</script>
<meta name="description" content="실무 중심으로 끝까지 완주하는 CODEWAVE 코스. 커리큘럼·강사·수강 혜택을 확인하세요.">
<meta property="og:site_name" content="CODEWAVE">
<meta property="og:type" content="website">
<meta property="og:url" content="https://codewave.kr/course.html">
<meta property="og:title" content="코스 상세 · CODEWAVE">
<meta property="og:description" content="실무 중심 커리큘럼, 1:1 코드 리뷰, 취업 연계까지. 7일 무료 체험으로 시작하세요.">
<meta property="og:image" content="https://codewave.kr/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="코스 상세 · CODEWAVE">
<meta name="twitter:description" content="실무 커리큘럼 · 1:1 코드 리뷰 · 취업 연계.">
<meta name="twitter:image" content="https://codewave.kr/assets/og-image.png">
<style>
.cdetail-hero{ background:var(--ink); color:#fff; padding:calc(var(--nav-h) + 60px) 0 70px; position:relative; overflow:hidden; }
.cdetail-hero .blob{ width:460px; height:460px; top:-160px; right:-60px; opacity:.4; }
.cdetail-hero .crumbs{ color:rgba(255,255,255,.55); font-size:14px; margin-bottom:24px; }
.cdetail-hero .crumbs a:hover{ color:#fff; }
.cdetail-hero h1{ font-size:clamp(32px,4.6vw,58px); max-width:760px; margin:14px 0 18px; }
.cdetail-hero .sub{ color:rgba(255,255,255,.75); font-size:19px; max-width:620px; }
.cdetail-hero .hmeta{ display:flex; gap:26px; flex-wrap:wrap; margin-top:30px; color:rgba(255,255,255,.85); font-weight:600; }
.cdetail-hero .hmeta span{ white-space:nowrap; }
.cdetail-hero .hmeta b{ color:var(--lime); }

.cbody{ display:grid; grid-template-columns:1fr 380px; gap:54px; align-items:start; }
@media (max-width:920px){ .cbody{ grid-template-columns:1fr; } }

.learn-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px 30px; }
.learn-grid li{ list-style:none; display:flex; gap:12px; align-items:flex-start; font-size:16px; }
.learn-grid .ck{ color:var(--blue); flex:none; margin-top:2px; }

.acc{ border:1px solid var(--line); border-radius:var(--r); overflow:hidden; }
.acc-item + .acc-item{ border-top:1px solid var(--line); }
.acc-head{ display:flex; align-items:center; justify-content:space-between; gap:14px; padding:20px 24px; cursor:pointer; background:var(--paper); transition:background .2s; }
.acc-head:hover{ background:var(--paper-2); }
.acc-head h4{ font-size:17.5px; } .acc-head .sm{ color:var(--txt-3); font-size:14px; font-weight:600; }
.acc-head .ico{ transition:transform .3s; flex:none; }
.acc-item.open .acc-head .ico{ transform:rotate(45deg); }
.acc-panel{ max-height:0; overflow:hidden; transition:max-height .35s ease; background:var(--paper-2); }
.acc-item.open .acc-panel{ max-height:400px; }
.acc-panel ul{ margin:0; padding:8px 24px 20px; list-style:none; }
.acc-panel li{ display:flex; align-items:center; gap:12px; padding:9px 0; color:var(--txt-2); font-size:15px; border-bottom:1px dashed var(--line); }
.acc-panel li:last-child{ border:none; }

.enroll{ position:sticky; top:calc(var(--nav-h) + 20px); }
.enroll .card2{ border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--shadow); overflow:hidden; background:var(--paper); }
.enroll .visual{ aspect-ratio:16/10; display:grid; place-items:center; }
.enroll .visual span{ font-family:var(--display); font-weight:700; font-size:80px; color:rgba(255,255,255,.95); }
.enroll .inner{ padding:24px; }
.enroll .price{ display:flex; align-items:baseline; gap:10px; }
.enroll .price .now{ font-family:var(--display); font-weight:700; font-size:34px; }
.enroll .price .was{ color:var(--txt-3); text-decoration:line-through; }
.enroll .price .off{ margin-left:auto; }
.enroll ul.inc{ list-style:none; padding:0; margin:20px 0; display:flex; flex-direction:column; gap:11px; font-size:14.5px; color:var(--txt-2); }
.enroll ul.inc li{ display:flex; gap:10px; align-items:center; }
.inst-row{ display:flex; gap:18px; align-items:center; padding:24px; border:1px solid var(--line); border-radius:var(--r-lg); }
.inst-row .ava{ width:72px; height:72px; border-radius:18px; display:grid; place-items:center; color:#fff; font-family:var(--display); font-weight:700; font-size:26px; flex:none; }
.blocklabel{ font-family:var(--display); font-weight:700; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--blue); margin-bottom:18px; }
</style>
</head>
<body data-page="" data-navdark="1">

<header class="cdetail-hero">
  <div class="blob" style="background:var(--blue)"></div>
  <div class="wrap">
    <div class="crumbs"><a href="index.html">홈</a> &nbsp;/&nbsp; <a href="courses.html">코스</a> &nbsp;/&nbsp; <span id="crumb-cat"></span></div>
    <div class="pillrow" id="hchips"></div>
    <h1 class="display" id="ctitle"></h1>
    <p class="sub" id="csub"></p>
    <div class="hmeta" id="hmeta"></div>
  </div>
</header>

<section class="section" style="padding-top:64px">
  <div class="wrap cbody">
    <!-- LEFT -->
    <div>
      <div data-reveal>
        <div class="blocklabel">What you'll learn</div>
        <h2 class="h-m" style="margin-bottom:24px">이런 걸 배웁니다</h2>
        <ul class="learn-grid" id="learn"></ul>
      </div>

      <div style="margin-top:64px" data-reveal>
        <div class="blocklabel">Curriculum</div>
        <h2 class="h-m" style="margin-bottom:8px">커리큘럼</h2>
        <p style="color:var(--txt-3);margin:0 0 24px" id="curri-meta"></p>
        <div class="acc" id="acc"></div>
      </div>

      <div style="margin-top:64px" data-reveal>
        <div class="blocklabel">Mentor</div>
        <h2 class="h-m" style="margin-bottom:24px">담당 강사</h2>
        <div class="inst-row" id="instrow"></div>
      </div>
    </div>

    <!-- RIGHT enroll -->
    <aside class="enroll">
      <div class="card2" data-reveal>
        <div class="visual" id="evisual"><span id="eicon"></span></div>
        <div class="inner">
          <div class="price">
            <span class="now" id="eprice"></span>
            <span class="was" id="ewas"></span>
            <span class="chip chip-lime off" id="eoff"></span>
          </div>
          <ul class="inc">
            <li>✓ 평생 무제한 수강</li>
            <li>✓ 1:1 실시간 코드 리뷰</li>
            <li>✓ 수료증 발급 & 취업 연계</li>
            <li>✓ 7일 무료 체험 · 100% 환불 보장</li>
          </ul>
          <a href="#" id="enrollbtn" class="btn btn-accent" data-magnet style="width:100%;justify-content:center;font-size:17px;padding:17px">수강 신청하기</a>
          <a href="#" class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:10px">7일 무료로 체험</a>
        </div>
      </div>
    </aside>
  </div>
</section>

<script src="assets/data.js"></script>
<script src="assets/chrome.js"></script>
<script src="assets/site.js"></script>
<script src="assets/theme.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id') || 'fe';
const c = COURSES.find(x=>x.id===id) || COURSES[0];
const mentor = INSTRUCTORS.find(m=>m.courses.includes(c.cat)) || INSTRUCTORS[0];

document.title = c.title + ' · CODEWAVE';
document.getElementById('crumb-cat').textContent = c.cat;
document.getElementById('hchips').innerHTML = `<span class="chip ${c.tagClass}">${c.tag}</span><span class="chip" style="background:rgba(255,255,255,.12);color:#fff;border:none">${c.cat}</span><span class="chip" style="background:rgba(255,255,255,.12);color:#fff;border:none">${c.level}</span>`;
document.getElementById('ctitle').textContent = c.title;
document.getElementById('csub').textContent = c.sub + ' — 실무 중심으로 끝까지 완주하는 코스.';
document.getElementById('hmeta').innerHTML = `<span>★ <b>${c.rating}</b> 만족도</span><span>수강생 <b>${c.students.toLocaleString('ko-KR')}</b>명</span><span><b>${c.weeks}</b>주 과정</span><span><b>${c.lessons}</b>개 강의</span>`;

const learns = ['실무에서 바로 쓰는 핵심 개념','단계별 실습 프로젝트 완성','포트폴리오용 결과물 제작','협업 워크플로우와 코드 리뷰','자주 묻는 면접 질문 대비','현업 트렌드와 베스트 프랙티스'];
document.getElementById('learn').innerHTML = learns.map(t=>`<li><span class="ck"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M20 6L9 17l-5-5"/></svg></span>${t}</li>`).join('');

// curriculum
const modules = [
  ['오리엔테이션 & 환경 설정', ['학습 로드맵 안내','개발 환경 세팅','첫 코드 실행하기']],
  ['핵심 개념 다지기', ['기초 문법과 구조','핵심 패턴 이해','실습 미니 프로젝트']],
  ['심화 & 실전', ['실무 시나리오 분석','성능 최적화','테스트와 디버깅']],
  ['프로젝트 & 포트폴리오', ['프로젝트 기획','구현 & 코드 리뷰','배포와 회고']],
];
document.getElementById('curri-meta').textContent = `${modules.length}개 챕터 · 총 ${c.lessons}개 강의 · ${c.weeks}주`;
document.getElementById('acc').innerHTML = modules.map((m,i)=>`
  <div class="acc-item ${i===0?'open':''}">
    <div class="acc-head"><div><h4>Chapter ${i+1}. ${m[0]}</h4><span class="sm">${m[1].length}개 레슨</span></div>
    <span class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--txt-2)" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg></span></div>
    <div class="acc-panel"><ul>${m[1].map(l=>`<li><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><polygon points="6 4 20 12 6 20 6 4" fill="var(--blue)"/></svg>${l}</li>`).join('')}</ul></div>
  </div>`).join('');
document.getElementById('acc').addEventListener('click',e=>{
  const h=e.target.closest('.acc-head'); if(!h)return;
  h.parentElement.classList.toggle('open');
});

// mentor
document.getElementById('instrow').innerHTML = `
  <div class="ava" style="background:${mentor.grad}">${mentor.initial}</div>
  <div><h4 style="font-size:20px">${mentor.name}</h4><div style="color:var(--txt-3);font-size:14.5px;margin:3px 0 8px">${mentor.role}</div>
  <div style="font-size:14px;color:var(--txt-2)">${mentor.exp} · 누적 수강생 ${mentor.students}</div></div>`;

// enroll card
document.getElementById('evisual').style.background = c.grad;
document.getElementById('eicon').innerHTML = c.icon;
document.getElementById('eprice').textContent = c.price.toLocaleString('ko-KR')+'원';
document.getElementById('ewas').textContent = c.was.toLocaleString('ko-KR')+'원';
document.getElementById('eoff').textContent = Math.round((1-c.price/c.was)*100)+'% 할인';
document.getElementById('enrollbtn').href = 'checkout.html?id='+c.id;
</script>
</body>
</html>
