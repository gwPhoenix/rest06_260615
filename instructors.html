<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강사진 · CODEWAVE</title>
<link rel="stylesheet" href="assets/site.css">
<script>(function(){try{var t=localStorage.getItem('cw-theme'),m=localStorage.getItem('cw-mode');if(t)document.documentElement.dataset.theme=t;if(m==='dark')document.documentElement.dataset.mode='dark';}catch(e){}})();</script>
<meta name="description" content="네이버·카카오·토스 출신 시니어와 자격증 전문가까지. CODEWAVE의 현업 멘토들을 만나보세요.">
<meta property="og:site_name" content="CODEWAVE">
<meta property="og:type" content="website">
<meta property="og:url" content="https://codewave.kr/instructors.html">
<meta property="og:title" content="강사진 · CODEWAVE">
<meta property="og:description" content="현업 최전선의 멘토들이 직접 가르칩니다. 책에 없는 진짜 노하우를 전합니다.">
<meta property="og:image" content="https://codewave.kr/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="강사진 · CODEWAVE">
<meta name="twitter:description" content="현업 최전선의 멘토들이 직접 가르칩니다.">
<meta name="twitter:image" content="https://codewave.kr/assets/og-image.png">
<style>
.page-hero{ padding:calc(var(--nav-h) + 80px) 0 60px; position:relative; overflow:hidden; }
.page-hero .blob{ width:480px; height:480px; background:var(--cyan); top:-200px; right:-80px; opacity:.16; }
.page-hero h1{ font-size:clamp(44px,7vw,100px); }
.inst-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:26px; }
.icard{ border:1px solid var(--line); border-radius:var(--r-lg); overflow:hidden; transition:.35s cubic-bezier(.2,.8,.2,1); }
.icard:hover{ transform:translateY(-8px); box-shadow:var(--shadow); border-color:transparent; }
.icard .photo{ aspect-ratio:4/3.4; display:grid; place-items:center; position:relative; overflow:hidden; }
.icard .photo .ini{ font-family:var(--display); font-weight:700; font-size:90px; color:rgba(255,255,255,.95); transition:transform .4s; }
.icard:hover .photo .ini{ transform:scale(1.08); }
.icard .photo .exp{ position:absolute; top:14px; right:14px; }
.icard .body{ padding:24px; }
.icard h3{ font-size:23px; } .icard .role{ color:var(--txt-3); font-size:14.5px; margin:6px 0 16px; }
.icard .stats{ display:flex; gap:20px; border-top:1px solid var(--line); padding-top:16px; }
.icard .stats .v{ font-family:var(--display); font-weight:700; font-size:19px; }
.icard .stats .k{ color:var(--txt-3); font-size:12.5px; }
@media (max-width:920px){ .inst-grid{ grid-template-columns:1fr 1fr; } }
@media (max-width:600px){ .inst-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body data-page="instructors">

<header class="page-hero wrap">
  <div class="blob"></div>
  <span class="eyebrow" data-reveal>Our Mentors</span>
  <h1 class="display" data-reveal data-d="1" style="margin-top:18px">현업이<br>직접 가르칩니다</h1>
  <p class="lead" data-reveal data-d="2" style="max-width:560px;margin-top:24px">네이버·카카오·토스·라인 출신 시니어부터 자격증 만점 전문가까지. 책에 없는 진짜 노하우를 전합니다.</p>
</header>

<section class="section" style="padding-top:30px">
  <div class="wrap">
    <div class="inst-grid" id="igrid"></div>
  </div>
</section>

<!-- CTA -->
<section class="section" style="padding-top:0">
  <div class="wrap">
    <div data-reveal style="background:var(--ink);border-radius:var(--r-xl);padding:70px 56px;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:30px;flex-wrap:wrap;position:relative;overflow:hidden">
      <div class="blob" style="width:340px;height:340px;background:var(--purple);opacity:.4;top:-120px;right:-40px"></div>
      <div><span class="eyebrow" style="color:var(--cyan)">Teach with us</span><h2 class="h-m" style="color:#fff;margin-top:14px">강사로 함께하실래요?</h2></div>
      <a href="#" class="btn btn-lime" data-magnet>강사 지원하기 →</a>
    </div>
  </div>
</section>

<script src="assets/data.js"></script>
<script src="assets/chrome.js"></script>
<script src="assets/site.js"></script>
<script src="assets/theme.js"></script>
<script>
document.getElementById('igrid').innerHTML = INSTRUCTORS.map((m,i)=>`
  <div class="icard" data-reveal data-d="${i%3}">
    <div class="photo" style="background:${m.grad}">
      <span class="exp chip" style="background:rgba(0,0,0,.25);color:#fff;border:none">${m.exp}</span>
      <span class="ini">${m.initial}</span>
    </div>
    <div class="body">
      <h3>${m.name}</h3>
      <div class="role">${m.role}</div>
      <div class="pillrow"><span class="chip chip-blue">${m.courses}</span></div>
      <div class="stats" style="margin-top:18px">
        <div><div class="v">${m.students}</div><div class="k">누적 수강생</div></div>
        <div><div class="v">${m.exp}</div><div class="k">실무 경력</div></div>
      </div>
    </div>
  </div>`).join('');
// reveal injected
if(window.CW && CW.scan) CW.scan();
</script>
</body>
</html>
